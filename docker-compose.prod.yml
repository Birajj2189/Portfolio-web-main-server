services:
  strapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-strapi
    restart: always
    env_file: .env
    environment:
      DATABASE_CLIENT: ${DATABASE_CLIENT}
      DATABASE_HOST: postgres
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_SSL: ${DATABASE_SSL}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      NODE_ENV: production
    ports:
      - "${PORT:-1330}:${PORT:-1330}"
    volumes:
      - strapi-uploads:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - portfolio-network

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: portfolio-auth-service
    restart: always
    env_file: ./auth-service/.env
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${DATABASE_USERNAME}:${DATABASE_PASSWORD}@postgres:5432/portfolio_auth?schema=public
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - portfolio-network
    command: >
      sh -c "npx prisma migrate deploy && node dist/server.js"

  postgres:
    image: postgres:16-alpine
    container_name: portfolio-postgres
    restart: always
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - portfolio-network

volumes:
  postgres-data:
  strapi-uploads:

networks:
  portfolio-network:
    driver: bridge
